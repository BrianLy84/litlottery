<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LitBillionaire — Weekly On-Chain Lottery</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0A0A0A;
  --card: #111111;
  --accent: #F5C518;
  --accent2: #FFDD66;
  --text: #EAEAEA;
  --text2: #AAAAAA;
  --gold-glow: 0 0 25px rgba(245, 197, 24, 0.5);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  line-height: 1.6;
}

.page { max-width: 1100px; margin: 0 auto; padding: 20px 20px 80px; }

/* HERO PANEL - BẮT BUỘC GIỮ */
.hero {
  background: linear-gradient(135deg, #1A1A1A, #2A1F0F);
  border: 1px solid #F5C51855;
  border-radius: 24px;
  overflow: hidden;
  margin-bottom: 32px;
  box-shadow: var(--gold-glow);
}

.hero-inner { display: flex; align-items: stretch; min-height: 240px; }
.hero-left { flex: 1; padding: 48px 52px; display: flex; flex-direction: column; justify-content: center; }
.hero-eyebrow {
  font-size: 11px; letter-spacing: 4px; color: #F5C518; font-weight: 600; margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.eline { width: 32px; height: 1px; background: #F5C518; }
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 68px; font-weight: 700; line-height: 1.05; letter-spacing: -1px;
  background: linear-gradient(90deg, #F5C518, #FFDD66, #F5C518);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.hero-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 20px; color: #D4A820; margin-bottom: 24px;
}

.hero-pills { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
.pill {
  padding: 8px 16px; border-radius: 9999px; font-size: 12px; font-weight: 600; letter-spacing: 1px;
  display: flex; align-items: center; gap: 6px;
}
.pill-live { background: #112211; border: 1px solid #22CC88; color: #22CC88; }
.pill-chain { background: #1F1A10; border: 1px solid #F5C518; color: #F5C518; }

/* JACKPOT + STATS */
.hero-right {
  width: 320px; background: linear-gradient(to bottom, #1F1708, #2A1F0F);
  padding: 32px 28px; display: flex; flex-direction: column; justify-content: center; gap: 24px;
  border-left: 1px solid #F5C51833;
}
.stat-row { display: flex; justify-content: space-between; align-items: center; }
.stat-lbl { font-size: 11px; letter-spacing: 2px; color: #AAA; text-transform: uppercase; }
.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px; font-weight: 700; color: #F5C518;
  text-shadow: var(--gold-glow);
}

/* Số chọn */
.balls {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 14px;
  margin: 28px 0;
}
.ball {
  width: 62px; height: 62px; border-radius: 50%;
  background: #1A1A1A; border: 2px solid #333;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #F5C518;
  transition: all 0.3s;
  cursor: pointer;
}
.ball:hover, .ball:focus-within {
  border-color: #F5C518;
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(245, 197, 24, 0.4);
}

/* Nút mua */
.btn-buy {
  width: 100%; padding: 18px; margin-top: 12px;
  background: linear-gradient(90deg, #F5C518, #FFDD66);
  color: #111; font-size: 18px; font-weight: 700; letter-spacing: 1px;
  border: none; border-radius: 16px; cursor: pointer;
  transition: all 0.3s;
}
.btn-buy:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245, 197, 24, 0.5); }

/* Các phần còn lại giữ phong cách tối giản + dark */
.panel, .activity-panel, .cdcard {
  background: var(--card);
  border: 1px solid #333;
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 24px;
}

.ph { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.phico { font-size: 22px; }

.cta-btn {
  background: #F5C518; color: #111; padding: 12px 24px; border-radius: 12px;
  font-weight: 600; border: none; cursor: pointer;
}

/* Toast & Modal giữ nguyên logic cũ nhưng style mới */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
