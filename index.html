<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lit Lottery - LitVM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.0/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f1e;
            color: #fff;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #00ff9d;
            text-align: center;
        }
        .card {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid #00ff9d33;
        }
        button {
            background: #00ff9d;
            color: black;
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            font-weight: bold;
        }
        button:hover {
            background: #00e68a;
        }
        .number-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .number-input {
            height: 65px;
            font-size: 1.6rem;
            text-align: center;
            background: #2a2a40;
            border: 2px solid #555;
            color: white;
            border-radius: 10px;
        }
        #status {
            margin: 15px 0;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 10px;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <h1>Lit Lottery</h1>
    <p style="text-align:center; color:#aaa;">Xổ số trên LitVM • Giá vé 0.001 zkLTC</p>

    <div class="card">
        <h2>Kết nối Wallet</h2>
        <button onclick="connectWallet()">🔗 KẾT NỐI WALLET</button>
        <div id="status">Chưa kết nối</div>
    </div>

    <div class="card">
        <h2>Mua Vé</h2>
        <button onclick="buyRandom(1)">Mua 1 Vé Ngẫu Nhiên</button>
        <button onclick="buyRandom(3)">Mua 3 Vé Ngẫu Nhiên</button>

        <h3 style="margin-top:25px;">Tự chọn 6 số (1-45)</h3>
        <div class="number-grid" id="numberGrid"></div>
        <button onclick="buyCustom()">Mua Vé Tự Chọn</button>
    </div>

    <div class="card">
        <p>Tổng vé đã bán: <strong id="totalTickets">Đang tải...</strong></p>
    </div>

    <script>
        let signer = null;
        let contract = null;
        const CONTRACT_ADDRESS = "0x0F4D5915C88e983193e850F2c180295B34ECdaDF";

        const ABI = [
            "function buyRandomTicket(uint256 quantity) external payable",
            "function buyCustomTicket(uint256[6] numbers, uint256 quantity) external payable",
            "function getTotalTickets() external view returns (uint256)"
        ];

        function createNumberGrid() {
            const grid = document.getElementById("numberGrid");
            grid.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const input = document.createElement("input");
                input.type = "number";
                input.min = "1";
                input.max = "45";
                input.className = "number-input";
                grid.appendChild(input);
            }
        }

        async function connectWallet() {
            const status = document.getElementById("status");

            if (typeof window.ethereum === "undefined") {
                status.innerHTML = "❌ MetaMask hoặc Rabby chưa được cài đặt";
                return;
            }

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                const address = await signer.getAddress();

                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

                status.innerHTML = `✅ Đã kết nối<br><small>${address}</small>`;
                loadInfo();
            } catch (err) {
                status.innerHTML = `❌ Kết nối thất bại: ${err.message}`;
            }
        }

        async function buyRandom(quantity) {
            if (!signer) {
                alert("Vui lòng kết nối wallet trước!");
                return;
            }
            try {
                const value = ethers.parseEther((0.001 * quantity).toString());
                const tx = await contract.buyRandomTicket(quantity, { value: value });
                await tx.wait();
                alert(`✅ Mua thành công ${quantity} vé ngẫu nhiên!`);
                loadInfo();
            } catch (e) {
                alert("Lỗi: " + (e.shortMessage || e.message));
            }
        }

        async function buyCustom() {
            if (!signer) {
                alert("Vui lòng kết nối wallet trước!");
                return;
            }

            const inputs = document.querySelectorAll(".number-input");
            const numbers = Array.from(inputs).map(input => Number(input.value));

            if (numbers.length !== 6 || numbers.some(n => isNaN(n) || n < 1 || n > 45)) {
                alert("Vui lòng nhập đủ 6 số từ 1 đến 45");
                return;
            }

            try {
                const tx = await contract.buyCustomTicket(numbers, 1, { value: ethers.parseEther("0.001") });
                await tx.wait();
                alert("✅ Mua vé tự chọn thành công!");
                loadInfo();
            } catch (e) {
                alert("Lỗi: " + (e.shortMessage || e.message));
            }
        }

        async function loadInfo() {
            if (!contract) return;
            try {
                const total = await contract.getTotalTickets();
                document.getElementById("totalTickets").innerText = total;
            } catch (e) {}
        }

        // Khởi tạo trang
        window.onload = () => {
            createNumberGrid();
        };
    </script>
</body>
</html>
