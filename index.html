<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LitBillionaire — On-Chain Lottery</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0A;
            color: #EAEAEA;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .page { max-width: 1100px; margin: 0 auto; }

        /* HERO - GIỮ NGUYÊN THEO YÊU CẦU */
        .hero {
            background: linear-gradient(135deg, #1F1708, #2A1F0F);
            border: 2px solid #F5C518;
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 0 40px rgba(245, 197, 24, 0.3);
        }
        .hero-eyebrow {
            font-size: 13px;
            letter-spacing: 4px;
            color: #F5C518;
            margin-bottom: 10px;
        }
        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 72px;
            font-weight: 700;
            color: #F5C518;
            margin: 15px 0;
        }
        .hero-sub {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 22px;
            color: #D4A820;
            margin-bottom: 30px;
        }
        .hero-pills {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .pill {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
        }
        .pill-live { background: #0F2A1F; border: 1px solid #22CC88; color: #22CC88; }
        .pill-chain { background: #2A210F; border: 1px solid #F5C518; color: #F5C518; }

        h2, .panel-title { color: #F5C518; margin-bottom: 20px; }
        .panel {
            background: #111;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .ball {
            width: 68px; height: 68px;
            background: #1A1A1A;
            border: 3px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #F5C518;
            margin: 10px;
        }
        .btn-buy {
            background: linear-gradient(90deg, #F5C518, #FFDD66);
            color: #111;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="page">

        <!-- HERO PANEL -->
        <div class="hero">
            <div class="hero-eyebrow">
                EST. 2026 · ON-CHAIN LOTTERY
            </div>
            <div class="hero-title">LitBillionaire</div>
            <div class="hero-sub">Where fortunes are made on-chain</div>
            
            <div class="hero-pills">
                <div class="pill pill-live">Live on LiteForge</div>
                <div class="pill pill-chain">⛏ LitVM Powered</div>
            </div>
        </div>

        <h2 style="text-align:center; margin:30px 0;">Giao diện Demo - Dark Theme</h2>

        <div class="panel">
            <h2 class="panel-title">Chọn 6 số của bạn</h2>
            <div style="display:flex; justify-content:center; flex-wrap:wrap;">
                <div class="ball">07</div>
                <div class="ball">14</div>
                <div class="ball">22</div>
                <div class="ball">29</div>
                <div class="ball">35</div>
                <div class="ball">41</div>
            </div>
            <button class="btn-buy">Mua Vé (0.001 zkLTC)</button>
        </div>

        <p style="text-align:center; color:#888; margin-top:40px;">
            Nếu vẫn bị đen hoàn toàn → thử mở bằng Chrome và Refresh (Ctrl + F5)
        </p>

    </div>
</body>
</html>
