<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LitBillionaire — Luxury On-chain Lottery</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 10%, #2c1f0f, #0f0c08);
            color: #f0e6c8;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: auto; padding: 40px 20px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #ffd700;
            letter-spacing: 2px;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.6);
        }

        .card {
            background: rgba(30,25,15,0.85);
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        button {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1405;
            border: none;
            padding: 16px 28px;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin: 12px 0;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255,215,0,0.6);
        }

        .numbers {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 25px 0;
        }

        .ball {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            background: rgba(255,215,0,0.1);
            transition: 0.3s;
        }

        .ball:hover {
            background: #ffd700;
            color: #1a1405;
            transform: scale(1.12);
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="logo">LitBillionaire</div>
        <button onclick="connectWallet()">Connect Wallet</button>
    </div>

    <div class="hero">
        <h1>Win the Chain</h1>
        <p>Luxury on-chain lottery powered by LitVM</p>
    </div>

    <div class="card">
        <h3 style="margin-bottom:20px; text-align:center; color:#ffd700;">Pick your lucky numbers</h3>
        <div class="numbers" id="numbers"></div>
        <button onclick="buyTicket()">Buy Ticket — 0.001 zkLTC</button>
    </div>

</div>

<script>
    function createNumbers() {
        const container = document.getElementById('numbers');
        container.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const ball = document.createElement('div');
            ball.className = 'ball';
            ball.textContent = Math.floor(Math.random()*45) + 1;
            container.appendChild(ball);
        }
    }

    function connectWallet() {
        alert("Wallet connection will be implemented with ethers.js");
    }

    function buyTicket() {
        alert("Transaction will be sent to smart contract");
    }

    window.onload = createNumbers;
</script>

</body>
</html>
